# Retromod Test Mod - NeoForge mod metadata
#
# Newer NeoForge (1.20.5+) reads this file in preference to mods.toml.
# Same fields as Forge's mods.toml but with NeoForge-specific dependency IDs.

modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"
issueTrackerURL = "https://github.com/Bownlux/Retromod/issues"

[[mods]]
modId = "retromod_test_mod"
version = "${file.jarVersion}"
displayName = "Retromod Test Mod"
authors = "Bownlux"
description = '''
Exercises Retromod's transformation pipeline and reports per-test results to the launch log.
Source mod compiled against an older MC version; Retromod translates it forward at load time.
'''

[[dependencies.retromod_test_mod]]
modId = "minecraft"
type = "required"
versionRange = "[1.20,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.retromod_test_mod]]
modId = "neoforge"
type = "required"
versionRange = "[20,)"
ordering = "NONE"
side = "CLIENT"
