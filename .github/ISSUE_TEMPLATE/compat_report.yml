name: Compatibility report
description: Report how well a mod runs through Retromod — it gets added to the Compatibility DB on the docs site.
title: "[Compat] <mod name> <mod version> on <host MC>"
labels: ["compat-report"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing! Honest reports are the most useful kind — "loads but X is broken"
        beats "works". A bot converts this report into a database entry automatically
        (you'll get a link to the pull request); once merged it appears on the
        [Compatibility DB](https://bownlux.github.io/Retromod/compatdb/). Tip: the
        [DB page](https://bownlux.github.io/Retromod/compatdb/) has a form that pre-fills all of this for you.

  - type: dropdown
    id: report_type
    attributes:
      label: Report type
      description: A bundle means "I ran all these mods at once" — combinations often behave differently than single mods.
      options:
        - Single mod
        - Bundle (multiple mods together)
    validations:
      required: true

  - type: input
    id: mod_name
    attributes:
      label: Mod name (or a label for the bundle)
      placeholder: e.g. AppleSkin — or "My QoL pack"
    validations:
      required: true

  - type: textarea
    id: bundle_mods
    attributes:
      label: Bundle mod list (bundles only)
      description: "One mod per line: name | version | MC version it was built for | link"
      placeholder: |
        AppleSkin | 2.5.2 | 1.20.1 | https://modrinth.com/mod/appleskin
        Chunky | 1.2.164 | 1.18.2 | https://modrinth.com/mod/chunky
    validations:
      required: false

  - type: input
    id: mod_link
    attributes:
      label: Mod link (Modrinth / CurseForge / GitHub)
      placeholder: https://modrinth.com/mod/appleskin
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: Mod version + the MC version it was built for
      placeholder: e.g. 2.5.2, built for 1.20.1
    validations:
      required: true

  - type: input
    id: host
    attributes:
      label: Host MC version you ran it on
      placeholder: e.g. 26.1.2
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Mod loader
      options:
        - Fabric
        - NeoForge
        - Forge
    validations:
      required: true

  - type: input
    id: retromod_version
    attributes:
      label: Retromod version used
      placeholder: e.g. 1.1.0-snapshot.3
    validations:
      required: true

  - type: dropdown
    id: badge
    attributes:
      label: Badge
      description: How well does it actually run?
      options:
        - "Diamond — indistinguishable from native; everything works"
        - "Gold — fully playable; minor or cosmetic quirks only"
        - "Iron — core features work; something noticeable is broken"
        - "Copper — loads and runs, but major features are missing/inert"
        - "Borked — crashes or unusable"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: One-line summary
      placeholder: e.g. Hunger overlay works; tooltip values are slightly off
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: What did you test? What works, what doesn't? Include log snippets for anything broken.
      placeholder: |
        - Joined a world, ate food: overlay renders correctly
        - Saturation tooltip shows 0 on golden carrots
        - No errors in the log
    validations:
      required: false

  - type: textarea
    id: other_mods
    attributes:
      label: Other mods in the instance (optional)
      description: Helps tell mod-vs-mod conflicts apart from Retromod issues.
    validations:
      required: false
