name: Publish to Modrinth

# Manual milestone publisher (the Modrinth twin of "Publish to CurseForge"). Builds the
# full dist/ (all loaders x MC 1.20+) and creates a Modrinth version for every JAR, each
# tagged with its exact MC version + loader.
#
# This does NOT run automatically (no push/release trigger) - you start it from the
# Actions tab. The rolling GitHub pre-release (release.yml) is separate and untouched.
#
# Re-running is safe: the script skips any version_number that already exists on the
# project, so it only uploads what is missing.
#
# -- One-time setup ----------------------------------------------------------
#   Settings -> Secrets and variables -> Actions:
#     * Secret   MODRINTH_TOKEN       = a Modrinth personal access token with the
#                                       "create versions" scope (modrinth.com ->
#                                       account settings -> PATs)
#     * Variable MODRINTH_PROJECT_ID  = the project id OR slug (both work on Modrinth)
#
# -- How to run --------------------------------------------------------------
#   1. Actions -> "Publish to Modrinth" -> Run workflow.
#   2. FIRST run with "Dry run" = true (the default): it validates the token +
#      tags + existing versions and prints the upload plan WITHOUT uploading anything.
#   3. If the plan looks right, run again with "Dry run" = false to upload.
#
# JARs whose MC version Modrinth does not list yet (e.g. a brand-new 26.2) are
# skipped with a warning, not failed - re-run once Modrinth adds the version tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.1.0)"
        required: true
      release_type:
        description: "Modrinth release type"
        type: choice
        options: [release, beta, alpha]
        default: release
      dry_run:
        description: "Dry run (validate + print plan, upload nothing)"
        type: boolean
        default: true

permissions:
  contents: read   # Modrinth publish is external (via token); no repo writes needed.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          check-latest: true

      - name: Install Python deps
        run: pip install requests

      - name: Build base JAR
        run: mvn package -q -DskipTests -Dexec.skip=true

      - name: Build all per-loader / per-MC JARs
        run: bash build-all.sh --skip-build

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
        run: |
          python3 scripts/publish-modrinth.py \
            --version "${{ inputs.version }}" \
            --release-type "${{ inputs.release_type }}" \
            --changelog-file CHANGELOG.md \
            ${{ inputs.dry_run && '--dry-run' || '' }}
