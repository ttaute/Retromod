name: Release latest main build

# Publishes a rolling "latest" pre-release on every successful CI run against
# main. The release tag (`latest`) is force-updated each time, so users always
# get the most recent build by downloading from the same URL.
#
# Versioned releases (e.g. v1.0.0-beta.5) are still cut by hand for milestone
# tags — this workflow does NOT touch those. It only manages the rolling
# release.
#
# Why workflow_run instead of `on: push`?
# ---------------------------------------
# Gating on CI completion means we never ship a build whose tests failed.
# The downside is a small UX wart: the Release workflow shows "skipped" in
# the Actions tab on every CI failure, which can look alarming. That's the
# trade — quality > tidy logs.
#
# Why Fabric only?
# ----------------
# Maven's shaded JAR (target/retromod-<ver>.jar) is a multi-loader fat JAR
# that contains fabric.mod.json AND META-INF/mods.toml AND
# META-INF/neoforge.mods.toml all at once. Loaders are partly tolerant of
# the extra metadata files, but distributing this fat JAR is the wrong
# default — under some loader/MC combinations it gets rejected for
# "looks like a different loader's mod" reasons.
#
# build-all.sh is the ground-truth distribution flow: it extracts the
# shaded JAR, strips the OTHER loaders' metadata, rewrites the kept
# metadata for a specific MC version, and emits one clean per-loader JAR
# into dist/<Loader>/<MC>/. We run that here and pick the Fabric output
# because Fabric is Retromod's primary, best-tested loader (see the
# README's loader matrix). Forge and NeoForge users currently get their
# JARs from milestone releases or by running build-all.sh themselves;
# rolling auto-publish for those is a future improvement.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  # Needed to create/update the release and force-update the `latest` tag.
  contents: write

jobs:
  release:
    # Only run when CI passed. workflow_run fires on every CI completion,
    # success or fail, so we have to filter ourselves.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the commit CI ran against
        uses: actions/checkout@v4
        with:
          # workflow_run runs in the context of the default branch by default,
          # not the triggering commit. Explicitly check out the SHA that CI
          # validated so we package exactly what was tested — not whatever
          # main happens to point at right now.
          ref: ${{ github.event.workflow_run.head_sha }}
          # Need full history for the "commits since last release" body.
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          check-latest: true

      - name: Build the shaded base JAR
        # build-all.sh expects target/retromod-<ver>.jar to already exist
        # because we pass --skip-build. Doing the Maven step ourselves (with
        # the cached deps) is cheaper than letting the script invoke another
        # mvn run inside it.
        run: mvn package -q -DskipTests -Dexec.skip=true

      - name: Produce per-loader, per-MC JARs via build-all.sh
        # build-all.sh strips fabric.mod.json/mods.toml/neoforge.mods.toml
        # down to one per output JAR. The Fabric/26.1.2 directory is the
        # one we publish.
        run: bash build-all.sh --skip-build

      - name: Resolve version metadata and stage Fabric artifact
        id: ver
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          MC_VERSION=26.1.2

          # build-all.sh emits dist/Fabric/<MC>/retromod-<ver>+<MC>.jar.
          # We rename to make the loader explicit in the downloaded filename
          # — the dist directory disambiguates loader, but a flat GitHub
          # release asset can't, so the suffix carries that information.
          DIST_JAR="dist/Fabric/${MC_VERSION}/retromod-${POM_VERSION}+${MC_VERSION}.jar"
          ARTIFACT_NAME="retromod-${POM_VERSION}+${MC_VERSION}-fabric.jar"

          if [ ! -f "$DIST_JAR" ]; then
            echo "ERROR: expected Fabric build at $DIST_JAR but it doesn't exist."
            echo "build-all.sh output:"
            find dist -name '*.jar' | head -20
            exit 1
          fi

          cp "$DIST_JAR" "$ARTIFACT_NAME"

          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILT_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Number of commits since this rolling release was last cut. The
          # `latest` tag may not exist on first run — fall back to "?".
          if git rev-parse --verify --quiet refs/tags/latest >/dev/null; then
            COMMITS_SINCE=$(git rev-list --count latest..HEAD)
          else
            COMMITS_SINCE="?"
          fi

          {
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "pom_version=${POM_VERSION}"
            echo "mc_version=${MC_VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "built_at=${BUILT_AT}"
            echo "commits_since=${COMMITS_SINCE}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256 for the artifact
        id: hash
        run: |
          SHA256=$(sha256sum "${{ steps.ver.outputs.artifact_name }}" | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          # The action force-updates this tag to the current SHA on each run.
          target_commitish: ${{ github.event.workflow_run.head_sha }}

          name: "Latest main build · Fabric · ${{ steps.ver.outputs.pom_version }} for MC ${{ steps.ver.outputs.mc_version }}"

          # `prerelease: true` keeps this from being shown as the headline
          # "Latest release" on the repo home page — that slot is reserved
          # for hand-cut milestone releases (v1.0.0-beta.5, future v1.0.0,
          # etc.). `make_latest: false` enforces the same.
          prerelease: true
          make_latest: false

          # Replace the previous build's asset rather than appending.
          files: ${{ steps.ver.outputs.artifact_name }}

          body: |
            **Rolling pre-release · Fabric build for MC ${{ steps.ver.outputs.mc_version }}** — auto-published on every successful CI run against `main`. Always points at the most recent green build. Versioned milestones (v1.0.0-beta.5, future v1.0.0…) are cut separately.

            ### What this is
            This is the **Fabric variant** of Retromod, built for **MC ${{ steps.ver.outputs.mc_version }}**. Fabric is Retromod's primary loader — see the [README](https://github.com/${{ github.repository }}#retromod) for why. The fat shaded JAR that contains all three loaders' metadata is intentionally not published here; loaders disagree about whether a multi-loader JAR is acceptable, and shipping a single-loader JAR avoids the ambiguity entirely.

            **Forge and NeoForge users:** the rolling channel doesn't auto-publish your variants yet. For now, grab the per-loader JARs from a tagged milestone release, or build them yourself: clone the repo and run `bash build-all.sh` — that produces `dist/Forge/<MC>/` and `dist/NeoForge/<MC>/` artifacts the same way this workflow produces the Fabric one.

            ### Build info
            | Field | Value |
            |---|---|
            | Loader | Fabric |
            | Target Minecraft | ${{ steps.ver.outputs.mc_version }} |
            | Source commit | [`${{ steps.ver.outputs.short_sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}) |
            | Built at | `${{ steps.ver.outputs.built_at }}` |
            | Commits since previous rolling release | `${{ steps.ver.outputs.commits_since }}` |
            | Java | 25 (Temurin) |

            ### Install
            1. Download **`${{ steps.ver.outputs.artifact_name }}`** below.
            2. Drop it into your Fabric instance's `mods/` folder.
            3. Launch once. Retromod creates `retromod-input/` next to `mods/`. Drop old mods there for transformation, then restart when prompted.

            See the [installation docs](https://bownlux.github.io/Retromod/installation) for the full per-loader walkthrough.

            ### Verify the download
            ```
            SHA-256: ${{ steps.hash.outputs.sha256 }}
            ```

            ### Heads up
            This is a **beta** rolling build. It passes the test suite but otherwise has had less manual exercise than the milestone releases. If something breaks, please attach `latest.log` and the failing mod JAR to a [GitHub issue](https://github.com/${{ github.repository }}/issues).
