modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/Bownlux/RetroMod/issues"

[[mods]]
modId = "retromod"
version = "${version}"
displayName = "RetroMod"
description = '''
Made by the Developers of revivalsmp.net

Backwards compatibility layer for Minecraft mods.
Run older mods on newer Minecraft versions automatically!

Supports:
- Minecraft 26.1+ (deobfuscated Mojang official names)
- NeoForge cross-version compatibility (1.21.x and 26.1+)
- Legacy mod translation (1.8+ through full shim chain)

Just drop your old mods in - RetroMod transforms them automatically!

Made by the Developers of revivalsmp.net
'''
authors = "Bownlux"
logoFile = "assets/retromod/icon.png"

[[dependencies.retromod]]
modId = "neoforge"
type = "required"
versionRange = "[21.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.retromod]]
modId = "minecraft"
type = "required"
versionRange = "[1.21,)"
ordering = "NONE"
side = "BOTH"
