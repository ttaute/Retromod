modLoader = "javafml"
loaderVersion = "[52,)"
license = "MIT"
issueTrackerURL = "https://github.com/Bownlux/RetroMod/issues"

[[mods]]
modId = "retromod"
version = "${version}"
displayName = "RetroMod"
description = '''
Made by the Developers of revivalsmp.net

Backwards compatibility layer for Minecraft mods.
Run older mods on newer Minecraft versions automatically!

Supports:
- Minecraft 26.1+ (deobfuscated Mojang official names)
- Forge cross-version compatibility
- Legacy mod translation (1.8+ through full shim chain)

Just drop your old mods in retromod-input/ - RetroMod transforms them!

Bug reports: github.com/Bownlux/RetroMod/issues

Made by the Developers of revivalsmp.net
'''
authors = "Bownlux"
logoFile = "assets/retromod/icon.png"

[[dependencies.retromod]]
modId = "forge"
mandatory = true
versionRange = "[52.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.retromod]]
modId = "minecraft"
mandatory = true
versionRange = "[1.21,)"
ordering = "NONE"
side = "BOTH"
