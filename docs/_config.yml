title: Retromod
description: >-
  Backwards compatibility layer for Minecraft mods — run older mods on
  newer versions. Supports Fabric, NeoForge, and Forge.
# NOTE on casing: the GitHub repo's displayed name is "RetroMod"
# (capital M), but the mod itself is named "Retromod" (capital R only)
# and the GitHub Pages URL is https://bownlux.github.io/Retromod/.
# baseurl below must match the Pages URL exactly — GitHub Pages URLs
# are case-sensitive. Don't change this to /RetroMod/ even if the repo's
# displayed name has the M capitalized; that's the repo, not the site.
baseurl: "/Retromod"
url: "https://bownlux.github.io"

# Use just-the-docs remote theme — wiki-style sidebar navigation, full-text
# search, dark/light toggle. Much closer to the Create Wiki look than the
# default Cayman theme.
remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge

# just-the-docs theme configuration
color_scheme: dark
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# GitHub corner in the header
aux_links:
  "GitHub":
    - "https://github.com/Bownlux/Retromod"
  "Releases":
    - "https://github.com/Bownlux/Retromod/releases"
  "Issues":
    - "https://github.com/Bownlux/Retromod/issues"

aux_links_new_tab: true

# Footer
footer_content: "Retromod is released under the <a href=\"https://github.com/Bownlux/Retromod/blob/main/LICENSE\">MIT License</a>. Copyright &copy; 2026 Bownlux."

# SEO
github:
  repository_url: https://github.com/Bownlux/Retromod
  is_project_page: true

# Callouts (info/warning/etc. boxes)
callouts_level: quiet
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
