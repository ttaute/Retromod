- name: Spawn
  badge: borked
  mod_version: "1.0.3"
  source_mc: "1.20.1"
  host_mc: "26.1.2"
  loader: fabric
  retromod: "1.1.0-snapshot.3"
  links:
    modrinth: https://modrinth.com/mod/spawn-mod
  summary: Loads to the title screen, but its 1.20.1 worldgen datapack can't parse on 26.1 — worlds won't load or create while it's installed.
  details: >-
    The bytecode side mostly works (the game reaches the title screen), but the
    mod ships datapack worldgen — biomes, configured/placed features, carvers —
    in 1.20.1 JSON formats that 26.1 can't parse (schema changes plus renamed
    c: tag conventions). Registry loading fails, which blocks entering or
    creating ANY world while the mod is present. Migrating datapack data across
    MC versions is a separate subsystem Retromod doesn't have yet. Its entity
    registration also trips a FabricEntityTypeBuilder inner-class gap (tracked).
  reporter: Bownlux
  date: 2026-06-10

- name: AsyncParticles
  badge: copper
  mod_version: "5.3.0"
  source_mc: "1.21.5"
  host_mc: "1.21.11"
  loader: fabric
  retromod: "1.0.1"
  links:
    modrinth: https://modrinth.com/mod/asyncparticles
  summary: The game runs with it installed, but the async-particle optimization (and its config) is inert on a non-matching host.
  details: >-
    AsyncParticles is coremod-class - it wraps the Mixin service itself and
    generates conditional mixins at load time. On 1.21.11 its own machinery
    cancels most of its mixins, and its core @Overwrite targets a
    ParticleEngine method whose signature changed, so it cannot apply. An
    @Overwrite body is the replacement code itself; no redirect can rewrite it
    for a changed method. Listed on Mods That Can't Be Translated. (#63)
  reporter: rorrem09-tech
  date: 2026-05-30
  issue: 63

- name: "AppleSkin + Chunky (together)"
  bundle: true
  badge: borked
  host_mc: "26.1.2"
  loader: fabric
  retromod: "1.1.0-snapshot.3"
  mods:
    - name: AppleSkin
      version: "2.5.2"
      source_mc: "1.20.1"
      link: https://modrinth.com/mod/appleskin
    - name: Chunky
      version: "1.2.164"
      source_mc: "1.18.2"
      link: https://modrinth.com/mod/chunky
  summary: Both load to the title screen together, but the world crashes on load in the server tick loop.
  details: >-
    Crash is attributable to Chunky - NoSuchMethodError on
    TicketType.create(String, Comparator), the 1.18-era chunk-ticket API that
    26.1 reworked. AppleSkin alone was not isolated in this run, which is
    exactly what bundle reports are for. See the single-mod Chunky entry.
  reporter: Bownlux
  date: 2026-06-10

- name: Chunky
  badge: borked
  mod_version: "1.2.164"
  source_mc: "1.18.2"
  host_mc: "26.1.2"
  loader: fabric
  retromod: "1.1.0-snapshot.3"
  links:
    modrinth: https://modrinth.com/mod/chunky
  summary: Loads and registers, but any world crashes on load - its 1.18 chunk-ticket API call no longer exists.
  details: >-
    NoSuchMethodError in the server tick loop:
    TicketType.create(String, Comparator). 26.1 reworked TicketType, and
    Chunky creates its chunk-loading ticket with the old 1.18 signature.
    Needs a TicketType bridge in Retromod (tracked) or a current Chunky build.
  reporter: Bownlux
  date: 2026-06-10
