# Retromod community compatibility database (rendered by docs/compatdb.md).
#
# One entry per (mod + source version + host) combination that someone actually
# ran. Add yours via the "Compatibility report" issue form on GitHub, or PR this
# file directly. Keep details honest — "loads but X is broken" beats "works".
#
# Badges (pick ONE):
#   diamond — indistinguishable from running natively; everything works
#   gold    — fully playable; minor or cosmetic quirks only
#   iron    — core features work; something noticeable is broken or inert
#   copper  — loads and runs, but major features are missing/inert
#   borked  — crashes or unusable
#
# Fields:
#   name, badge, mod_version, source_mc (version the mod was built for),
#   host_mc, loader (fabric|neoforge|forge), retromod (version used),
#   links: {modrinth|curseforge|github: url}, summary (one line),
#   details (longer, optional), reporter, date (YYYY-MM-DD), issue (optional #N)
#
# BUNDLE reports ("I used all these mods at once") — mods often behave
# differently in combination. Set `bundle: true`, use `name` as a label for the
# combo, and list the mods under `mods:` (each: name, version, source_mc,
# link). One badge applies to the whole combo. If you can attribute the
# failure to one mod, ALSO file a single-mod entry for it.

- name: EMI
  badge: gold
  mod_version: "2.x"
  source_mc: "1.21.1"
  host_mc: "26.1.2"
  loader: neoforge
  retromod: "1.1.0-snapshot.3"
  links:
    modrinth: https://modrinth.com/mod/emi
  summary: Recipe viewer loads and indexes recipes after the RecipesUpdatedEvent rename fix.
  details: >-
    Crashed at construct time on snapshot.2 and earlier
    (NoClassDefFoundError: RecipesUpdatedEvent — the event was renamed in the
    1.21.4 line). Fixed by a class redirect in snapshot.3; the listener only
    re-triggers EMI's own reload, so the rename is all it needed.
  reporter: Bownlux
  date: 2026-06-10
  issue: 82

- name: Rubinated Nether
  badge: gold
  mod_version: "1.x"
  source_mc: "1.21.1"
  host_mc: "26.1.2"
  loader: fabric
  retromod: "1.1.0-snapshot.2"
  links:
    modrinth: https://modrinth.com/mod/rubinated-nether
  summary: Content registers correctly once jar-in-jar libraries get their bytecode remapped.
  details: >-
    Loaded with no content before snapshot.2 — it registers everything through
    the bundled Critter library, whose remapped nested bytecode was being
    discarded. Fixed in snapshot.2 (#71): nested JIJ libraries keep their
    remap now.
  reporter: Bownlux
  date: 2026-06-01
  issue: 71

- name: Arcanus Continuum
  badge: borked
  mod_version: "0.112.11"
  source_mc: "1.20.1"
  host_mc: "1.21.11"
  loader: fabric
  retromod: "1.1.0-snapshot.3"
  links:
    modrinth: https://modrinth.com/mod/arcanus
  summary: Retromod no longer corrupts its mixins, but its bundled reach-entity-attributes still can't apply on 1.21.11.
  details: >-
    snapshot.3 fixed the Retromod-caused failure (the model bridge was
    rewriting its mixin handler descriptors — #70). What remains is the mod's
    own jar-in-jar reach-entity-attributes 2.4.0, whose 1.20.1-era mixins
    target methods that changed by 1.21.11 (multiple critical injection
    failures). Needs the mixin-handler re-typing work tracked for a later
    release, or a 1.21.x build of the mod.
  reporter: Bownlux
  date: 2026-06-10
  issue: 70

